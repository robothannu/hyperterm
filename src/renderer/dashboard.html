<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self';"
  />
  <title>Workspace Dashboard — HyperTerm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />
  <style>
    /* === Design Tokens (mirror styles.css) === */
    :root {
      --bg-0: #0a0b0f;
      --bg-1: #0e1014;
      --bg-2: #14161c;
      --bg-3: #1a1d25;
      --bg-4: #232731;
      --line: rgba(255,255,255,0.06);
      --line-2: rgba(255,255,255,0.09);
      --fg-0: #e8eaf0;
      --fg-1: #c6c9d2;
      --fg-2: #8a8f9c;
      --fg-3: #5d626e;
      --accent: #7c8cff;
      --accent-2: #a78bfa;
      --ok: #4ade80;
      --warn: #f5b547;
      --err: #ff6b6b;
      --radius: 10px;
    }

    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg-0);
      color: var(--fg-0);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    /* === Titlebar (traffic lights drag region) === */
    #titlebar {
      height: 40px;
      min-height: 40px;
      background: linear-gradient(180deg, #0f1116, var(--bg-0));
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      padding: 0 80px 0 16px;
      -webkit-app-region: drag;
    }

    #titlebar h1 {
      font-size: 13px;
      font-weight: 600;
      color: var(--fg-1);
      letter-spacing: 0.02em;
      pointer-events: none;
    }

    /* === Main content === */
    #content {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 40px);
      overflow-y: auto;
      padding: 24px;
      gap: 16px;
    }

    /* === Header row === */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--fg-3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* === Add workspace button === */
    #btn-add-workspace {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
      -webkit-app-region: no-drag;
    }

    #btn-add-workspace:hover { opacity: 0.85; }
    #btn-add-workspace:active { opacity: 0.7; }

    /* === Toast === */
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-4);
      border: 1px solid var(--line-2);
      color: var(--fg-1);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      white-space: nowrap;
      z-index: 100;
    }

    #toast.visible { opacity: 1; }
    #toast.warn { color: var(--warn); }

    /* === Workspace list === */
    #workspace-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      list-style: none;
    }

    .ws-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      transition: border-color 0.15s;
    }

    .ws-item:hover { border-color: var(--line-2); }

    .ws-icon {
      font-size: 16px;
      flex-shrink: 0;
      line-height: 1;
    }

    .ws-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      min-width: 0;
    }

    .ws-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--fg-0);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ws-path {
      font-size: 11px;
      font-family: "JetBrains Mono", ui-monospace, Menlo, monospace;
      color: var(--fg-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Missing marker */
    .ws-item.missing .ws-name::after {
      content: " (missing)";
      font-size: 11px;
      font-weight: 400;
      color: var(--err);
    }

    .ws-item.missing .ws-path {
      color: var(--err);
      opacity: 0.6;
    }

    /* === Remove button === */
    .btn-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--fg-3);
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: background 0.12s, color 0.12s;
      flex-shrink: 0;
      font-family: inherit;
    }

    .btn-remove:hover {
      background: rgba(255, 107, 107, 0.12);
      color: var(--err);
    }

    /* === Empty state === */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 48px 24px;
      text-align: center;
      color: var(--fg-3);
      font-size: 13px;
    }

    #empty-state .empty-icon {
      font-size: 32px;
      opacity: 0.4;
    }

    #empty-state .empty-text {
      color: var(--fg-3);
    }
  </style>
</head>
<body>
  <div id="titlebar">
    <h1>Workspace Dashboard</h1>
  </div>

  <div id="content">
    <div class="section-header">
      <span class="section-title">Workspaces</span>
      <button id="btn-add-workspace">
        <svg width="10" height="10" viewBox="0 0 16 16" fill="none">
          <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Add Workspace
      </button>
    </div>

    <ul id="workspace-list"></ul>
    <div id="empty-state" style="display:none">
      <span class="empty-icon">&#128193;</span>
      <span class="empty-text">No workspaces yet.<br/>Click "Add Workspace" to add a folder.</span>
    </div>
  </div>

  <div id="toast"></div>

  <script src="dashboard.js"></script>
</body>
</html>
