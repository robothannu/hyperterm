<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self';"
  />
  <title>Workspace Dashboard — HyperTerm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />
  <style>
    /* === Design Tokens === */
    :root {
      --bg-0: #0a0b0f;
      --bg-1: #0e1014;
      --bg-2: #14161c;
      --bg-3: #1a1d25;
      --bg-4: #232731;
      --line: rgba(255,255,255,0.06);
      --line-2: rgba(255,255,255,0.09);
      --line-3: rgba(255,255,255,0.13);
      --fg-0: #e8eaf0;
      --fg-1: #c6c9d2;
      --fg-2: #8a8f9c;
      --fg-3: #5d626e;
      --accent: #7c8cff;
      --accent-2: #a78bfa;
      --ok: #4ade80;
      --warn: #f5b547;
      --err: #ff6b6b;
      --cyan: #67e8f9;
      --glass: rgba(255,255,255,0.03);
      --glass-strong: rgba(255,255,255,0.05);
      --radius: 10px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg-0);
      color: var(--fg-0);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, monospace; }

    /* === Titlebar === */
    #titlebar {
      height: 40px;
      min-height: 40px;
      background: linear-gradient(180deg, #0f1116, var(--bg-0));
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      padding: 0 16px 0 84px;
      -webkit-app-region: drag;
    }

    #titlebar h1 {
      font-size: 13px;
      font-weight: 600;
      color: var(--fg-1);
      letter-spacing: 0.02em;
      pointer-events: none;
    }

    /* === App shell (below titlebar) === */
    #app {
      display: grid;
      grid-template-rows: auto auto 1fr;
      height: calc(100vh - 40px);
      min-height: 0;
    }

    /* === Toolbar === */
    #toolbar {
      padding: 14px 20px 0;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #0c0d12, transparent);
      flex-wrap: wrap;
    }

    .tb-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--fg-3);
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .tb-search {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 32px;
      padding: 0 12px;
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      flex: 1;
      min-width: 120px;
      max-width: 420px;
    }

    .tb-search input {
      flex: 1;
      background: transparent;
      border: 0;
      outline: 0;
      color: var(--fg-0);
      font-size: 12.5px;
      font-family: inherit;
    }

    .tb-search input::placeholder { color: var(--fg-3); }

    .kbd {
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 4px;
      background: rgba(255,255,255,0.06);
      color: var(--fg-2);
      border: 1px solid var(--line);
      white-space: nowrap;
    }

    .tb-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      -webkit-app-region: no-drag;
      flex-shrink: 0;
    }

    .btn {
      height: 30px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--fg-1);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
    }

    .btn:hover { background: var(--bg-3); color: var(--fg-0); }

    .btn.primary {
      background: linear-gradient(180deg, var(--accent), #6a7aef);
      border-color: transparent;
      color: white;
    }

    .btn.primary:hover { filter: brightness(1.1); }

    /* === Filter bar === */
    #filterbar {
      flex-basis: 100%;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 0 14px;
      border-top: 1px dashed var(--line);
      flex-wrap: wrap;
    }

    .chip-group {
      display: inline-flex;
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 2px;
      flex-wrap: wrap;
    }

    .chip {
      height: 24px;
      padding: 0 10px;
      border: 0;
      background: transparent;
      border-radius: 5px;
      color: var(--fg-2);
      font-size: 11.5px;
      cursor: pointer;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .chip:hover { color: var(--fg-0); }

    .chip.active {
      background: rgba(124,140,255,0.18);
      color: var(--fg-0);
      box-shadow: 0 0 0 1px rgba(124,140,255,0.3) inset;
    }

    .chip .count {
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      color: var(--fg-3);
      background: rgba(255,255,255,0.06);
      padding: 0 5px;
      border-radius: 8px;
    }

    .chip.active .count {
      color: var(--accent);
      background: rgba(124,140,255,0.15);
    }

    .filter-spacer { flex: 1; min-width: 8px; }

    .sort-wrap {
      position: relative;
      display: inline-block;
    }

    .sort-btn {
      height: 28px;
      padding: 0 10px;
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--fg-1);
      font-size: 11.5px;
      cursor: pointer;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .sort-btn:hover { background: var(--bg-3); }

    .sort-btn.active {
      background: var(--bg-3);
      border-color: var(--line-2);
    }

    .sort-menu {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      min-width: 180px;
      background: var(--bg-2);
      border: 1px solid var(--line-2);
      border-radius: 8px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.5);
      padding: 4px;
      display: none;
      z-index: 50;
    }

    .sort-menu.open { display: block; }

    .sort-menu-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 5px;
      font-size: 12px;
      color: var(--fg-1);
      cursor: pointer;
      font-family: inherit;
      background: transparent;
      border: 0;
      width: 100%;
      text-align: left;
    }

    .sort-menu-item:hover { background: var(--bg-3); color: var(--fg-0); }

    .sort-menu-item .check {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
      color: var(--accent);
      visibility: hidden;
    }

    .sort-menu-item.selected .check { visibility: visible; }
    .sort-menu-item.selected { color: var(--fg-0); }

    .view-toggle {
      display: inline-flex;
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 2px;
    }

    .vt {
      width: 28px;
      height: 24px;
      border: 0;
      background: transparent;
      border-radius: 5px;
      color: var(--fg-2);
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    .vt:hover { color: var(--fg-0); }

    .vt.active {
      background: rgba(124,140,255,0.18);
      color: var(--fg-0);
      box-shadow: 0 0 0 1px rgba(124,140,255,0.3) inset;
    }

    /* === Content area === */
    #content {
      overflow-y: auto;
      padding: 18px 20px 30px;
      min-height: 0;
      scrollbar-width: thin;
      scrollbar-color: var(--bg-4) transparent;
    }

    #content::-webkit-scrollbar { width: 8px; }
    #content::-webkit-scrollbar-track { background: transparent; }
    #content::-webkit-scrollbar-thumb {
      background: var(--bg-4);
      border-radius: 4px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    #content::-webkit-scrollbar-thumb:hover {
      background: var(--line-3);
      background-clip: padding-box;
    }

    /* === Group header === */
    .group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 4px 0 10px;
      color: var(--fg-2);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
    }

    .group-header:not(:first-child) { margin-top: 22px; }

    .group-header .count {
      font-family: "JetBrains Mono", monospace;
      color: var(--fg-3);
      background: rgba(255,255,255,0.04);
      padding: 1px 7px;
      border-radius: 8px;
      font-size: 10.5px;
      text-transform: none;
      letter-spacing: 0;
    }

    .group-header .line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--line), transparent);
    }

    /* === Grid layout === */
    .ws-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    @media (max-width: 1100px) {
      .ws-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 800px) {
      .ws-grid { grid-template-columns: 1fr; }
    }

    /* === Card === */
    .ws-card {
      background: var(--bg-1);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      position: relative;
    }

    .ws-card:hover {
      border-color: var(--line-2);
      transform: translateY(-1px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    }

    /* Color strip */
    .ws-card.dirty  { box-shadow: inset 3px 0 0 var(--warn); }
    .ws-card.running { box-shadow: inset 3px 0 0 var(--ok); }
    .ws-card.behind { box-shadow: inset 3px 0 0 var(--err); }

    .ws-card.dirty:hover  { box-shadow: inset 3px 0 0 var(--warn), 0 12px 30px rgba(0,0,0,0.35); }
    .ws-card.running:hover { box-shadow: inset 3px 0 0 var(--ok), 0 12px 30px rgba(0,0,0,0.35); }
    .ws-card.behind:hover { box-shadow: inset 3px 0 0 var(--err), 0 12px 30px rgba(0,0,0,0.35); }

    /* Card head */
    .card-head {
      padding: 12px 14px 10px;
      display: grid;
      grid-template-columns: 28px 1fr auto;
      column-gap: 10px;
      align-items: center;
      border-bottom: 1px solid var(--line);
    }

    .ws-icon {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      font-family: "JetBrains Mono", monospace;
      font-weight: 700;
      font-size: 13px;
      color: white;
      flex-shrink: 0;
    }

    .ws-icon.purple { background: linear-gradient(135deg, #a78bfa, #6a4ed4); }
    .ws-icon.cyan   { background: linear-gradient(135deg, #67e8f9, #2bb5cf); }
    .ws-icon.pink   { background: linear-gradient(135deg, #f472b6, #c93c8a); }
    .ws-icon.green  { background: linear-gradient(135deg, #4ade80, #1f9c50); }
    .ws-icon.yellow { background: linear-gradient(135deg, #f5b547, #c08317); }

    .card-titlewrap { min-width: 0; }

    .card-title {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--fg-0);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-path {
      font-family: "JetBrains Mono", monospace;
      font-size: 10.5px;
      color: var(--fg-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }

    .card-quick {
      display: flex;
      gap: 2px;
      opacity: 0;
      transition: opacity .15s;
    }

    .ws-card:hover .card-quick { opacity: 1; }

    .qbtn {
      width: 26px;
      height: 26px;
      display: grid;
      place-items: center;
      background: transparent;
      border: 0;
      border-radius: 6px;
      color: var(--fg-2);
      cursor: pointer;
    }

    .qbtn:hover { background: var(--glass-strong); color: var(--fg-0); }

    /* Status strip */
    .status-strip {
      padding: 8px 14px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      background: rgba(255,255,255,0.015);
      border-bottom: 1px solid var(--line);
    }

    .ss-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--fg-2);
    }

    .ss-item .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--fg-3);
    }

    .ss-item.live .dot { background: var(--ok); box-shadow: 0 0 6px rgba(74,222,128,0.5); }
    .ss-item .branch { color: var(--accent); }
    .ss-item .ahead  { color: var(--warn); }
    .ss-item .behind { color: var(--cyan); }
    .ss-item .changed { color: var(--warn); }
    .ss-item .clean  { color: var(--ok); }
    .ss-item .ago    { color: var(--fg-3); }

    /* Tags row */
    .tags-row {
      padding: 8px 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      border-bottom: 1px solid var(--line);
    }

    .tag {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 7px;
      border-radius: 4px;
      background: rgba(124,140,255,0.12);
      color: var(--accent);
      border: 1px solid rgba(124,140,255,0.18);
    }

    .tag.warn { background: rgba(245,181,71,0.12); color: var(--warn); border-color: rgba(245,181,71,0.18); }
    .tag.cyan { background: rgba(103,232,249,0.1);  color: var(--cyan); border-color: rgba(103,232,249,0.16); }
    .tag.gray { background: rgba(255,255,255,0.04); color: var(--fg-2); border-color: var(--line); }

    /* Card body */
    .card-body {
      padding: 12px 14px 14px;
      display: grid;
      gap: 12px;
      flex: 1;
    }

    .field {
      display: grid;
      grid-template-columns: 76px 1fr;
      column-gap: 12px;
      align-items: start;
    }

    .field-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--fg-3);
      font-weight: 600;
      padding-top: 2px;
    }

    .field-value {
      font-size: 12px;
      color: var(--fg-1);
      line-height: 1.5;
    }

    .field-value strong { color: var(--fg-0); font-weight: 600; }

    /* Todo list */
    .todo-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 6px;
    }

    .todo-priority {
      display: inline-block;
      font-size: 9.5px;
      padding: 0 5px;
      border-radius: 3px;
      margin-right: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 700;
      vertical-align: 1px;
    }

    .todo-priority.opt { color: var(--fg-3); border: 1px solid var(--line-2); }
    .todo-priority.lo  { color: var(--cyan); background: rgba(103,232,249,0.08); }
    .todo-priority.hi  { color: var(--warn); background: rgba(245,181,71,0.1); }

    /* Card footer */
    .card-foot {
      margin-top: auto;
      padding: 10px 14px;
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,0.015);
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .card-foot .updated {
      font-family: "JetBrains Mono", monospace;
      font-size: 10.5px;
      color: var(--fg-3);
      margin-right: auto;
    }

    .open-btn {
      height: 26px;
      padding: 0 10px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 0;
      border-radius: 6px;
      background: var(--bg-3);
      color: var(--fg-1);
      font-family: inherit;
      font-size: 11.5px;
      cursor: pointer;
    }

    .open-btn:hover { background: var(--bg-4); color: var(--fg-0); }

    .open-btn.primary {
      background: linear-gradient(180deg, var(--accent), #6a7aef);
      color: white;
    }

    .open-btn.primary:hover { filter: brightness(1.1); }

    /* Remove button */
    .btn-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--fg-3);
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: background 0.12s, color 0.12s;
      font-family: inherit;
    }

    .btn-remove:hover {
      background: rgba(255, 107, 107, 0.12);
      color: var(--err);
    }

    /* === Expand/collapse (Sprint 1 UX Polish) === */
    /* Collapsed cards hide status-strip, tags-row and card-body — show only head + foot. */
    .ws-card.collapsed .status-strip,
    .ws-card.collapsed .tags-row,
    .ws-card.collapsed .card-body,
    .ws-card.collapsed .card-expand {
      display: none;
    }

    /* card-expand container — Sprint 2 gitflow host (border/padding owned by inner .gitflow-wrap) */
    .card-expand {
      font-size: 11px;
      color: var(--fg-3);
    }
    .card-expand:empty { display: none; }

    /* ============ Git Flow (Sprint 2) ============ */
    .gitflow-wrap {
      border-top: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.012), transparent);
    }
    .gitflow-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px 6px;
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--fg-3); font-weight: 600;
    }
    .gitflow-head .legend {
      display: flex; gap: 10px; text-transform: none; letter-spacing: 0;
      font-size: 10.5px; color: var(--fg-2); font-family: "JetBrains Mono", monospace;
    }
    .gitflow-head .lg-item { display: inline-flex; align-items: center; gap: 4px; }
    .gitflow-head .lg-dot {
      width: 7px; height: 7px; border-radius: 50%;
    }
    .gitflow-svg {
      width: 100%;
      display: block;
      padding: 4px 10px 12px;
    }
    .gitflow-svg .lane-label {
      font-family: "JetBrains Mono", monospace;
      font-size: 9.5px;
      fill: var(--fg-1);
      font-weight: 500;
    }
    .gitflow-svg .lane-line {
      stroke: rgba(255,255,255,0.05);
      stroke-dasharray: 2 3;
    }
    .gitflow-svg .commit-edge {
      stroke: rgba(255,255,255,0.18);
      stroke-width: 1.4;
      fill: none;
    }
    .gitflow-svg .commit-edge.merge { stroke: rgba(255,255,255,0.28); }
    .gitflow-svg .tag {
      font-family: "JetBrains Mono", monospace;
      font-size: 9.5px;
      fill: var(--fg-0);
      font-weight: 600;
    }
    .gitflow-svg .tag-bg {
      fill: var(--bg-3);
      stroke: var(--line-2);
    }
    .gitflow-svg .commit {
      cursor: pointer;
    }
    .gitflow-svg .commit circle {
      transition: r .15s, filter .15s;
    }
    .gitflow-svg .commit:hover circle { filter: brightness(1.25); }
    .gitflow-svg .commit.head circle {
      stroke: var(--fg-0);
      stroke-width: 1.5;
    }
    .gitflow-svg .head-label {
      font-family: "JetBrains Mono", monospace;
      font-size: 9px;
      font-weight: 700;
      fill: var(--fg-0);
    }

    /* === Card more (kebab) menu — archive/remove access from card head === */
    .card-more-wrap {
      position: relative;
      display: inline-block;
    }

    .qbtn.more-btn {
      opacity: 1;
    }

    .card-menu {
      position: absolute;
      top: calc(100% + 2px);
      right: 0;
      min-width: 160px;
      background: var(--bg-2);
      border: 1px solid var(--line-2);
      border-radius: 8px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.5);
      padding: 4px;
      display: none;
      z-index: 60;
    }

    .card-menu.open { display: block; }

    .card-menu-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 5px;
      font-size: 12px;
      color: var(--fg-1);
      cursor: pointer;
      font-family: inherit;
      background: transparent;
      border: 0;
      width: 100%;
      text-align: left;
    }

    .card-menu-item:hover { background: var(--bg-3); color: var(--fg-0); }
    .card-menu-item.danger:hover { background: rgba(255,107,107,0.12); color: var(--err); }

    /* === List view === */
    .ws-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
    }

    .list-header {
      display: grid;
      grid-template-columns: 28px minmax(140px,200px) 1fr minmax(160px,240px) minmax(80px,110px) minmax(80px,90px);
      column-gap: 14px;
      padding: 8px 14px;
      background: var(--bg-2);
      color: var(--fg-3);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      border-bottom: 1px solid var(--line);
    }

    .list-row {
      display: grid;
      grid-template-columns: 28px minmax(140px,200px) 1fr minmax(160px,240px) minmax(80px,110px) minmax(80px,90px);
      align-items: center;
      column-gap: 14px;
      padding: 10px 14px;
      border-top: 1px solid var(--line);
      background: var(--bg-1);
      cursor: pointer;
    }

    .list-row:first-child { border-top: 0; }
    .list-row:hover { background: var(--bg-2); }

    .list-row .lr-name {
      font-weight: 600;
      color: var(--fg-0);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .list-row .lr-name .lr-path {
      display: block;
      font-weight: 400;
      font-size: 10.5px;
      color: var(--fg-3);
      font-family: "JetBrains Mono", monospace;
    }

    .list-row .lr-summary {
      font-size: 12px;
      color: var(--fg-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .list-row .lr-git {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: var(--fg-2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .list-row .lr-git .branch { color: var(--accent); }
    .list-row .lr-git .changed { color: var(--warn); }

    .list-row .lr-updated {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: var(--fg-3);
    }

    .list-row .lr-actions {
      display: flex;
      gap: 4px;
      justify-content: flex-end;
      opacity: 0;
      transition: opacity .15s;
    }

    .list-row:hover .lr-actions { opacity: 1; }

    /* Loading / Absent states */
    .card-loading {
      padding: 14px;
      color: var(--fg-3);
      font-size: 12px;
      font-style: italic;
    }

    .card-absent {
      font-size: 12px;
      color: var(--fg-3);
      font-style: italic;
    }

    /* === Empty state === */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 64px 24px;
      text-align: center;
    }

    #empty-state .empty-icon { font-size: 40px; opacity: 0.3; }
    #empty-state .empty-title { font-size: 15px; font-weight: 600; color: var(--fg-1); }
    #empty-state .empty-sub { font-size: 13px; color: var(--fg-3); line-height: 1.5; }

    #btn-empty-add {
      margin-top: 4px;
      padding: 8px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }

    #btn-empty-add:hover { opacity: 0.85; }

    /* === No match state === */
    #no-match {
      text-align: center;
      padding: 80px 20px;
      color: var(--fg-3);
    }

    #no-match .nm-title {
      font-size: 14px;
      color: var(--fg-1);
      margin-bottom: 6px;
    }

    /* === Toast === */
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-4);
      border: 1px solid var(--line-2);
      color: var(--fg-1);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      white-space: nowrap;
      z-index: 100;
    }

    #toast.visible { opacity: 1; }
    #toast.warn { color: var(--warn); }
    #toast.err  { color: var(--err); }
    #toast.ok   { color: var(--ok); }

    /* === Missing card === */
    .ws-card.missing {
      opacity: 0.7;
    }

    .missing-notice {
      font-size: 12px;
      color: var(--err);
      padding: 10px 14px;
      font-style: italic;
    }

    /* === Skeleton loading === */
    @keyframes shimmer {
      0%   { opacity: 0.4; }
      50%  { opacity: 0.7; }
      100% { opacity: 0.4; }
    }

    .skeleton-block {
      display: inline-block;
      height: 10px;
      border-radius: 4px;
      background: var(--bg-4);
      animation: shimmer 1.4s ease-in-out infinite;
    }

    .skeleton-strip {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .skeleton-body {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px 14px;
    }

    /* === Todo more toggle === */
    .todo-more {
      font-size: 11px;
      color: var(--accent);
      padding-top: 4px;
      cursor: pointer;
      user-select: none;
    }

    .todo-more:hover { color: var(--fg-1); }

    /* todo-item no longer uses checkbox grid */
    .todo-item {
      display: block;
      font-size: 12px;
      color: var(--fg-1);
      line-height: 1.45;
      padding-left: 12px;
      position: relative;
    }

    .todo-item::before {
      content: "·";
      position: absolute;
      left: 2px;
      color: var(--fg-3);
    }
  </style>
</head>
<body>
  <div id="titlebar">
    <h1>Workspace Dashboard</h1>
  </div>

  <div id="app">
    <!-- Toolbar -->
    <div id="toolbar">
      <div class="tb-title">Workspaces</div>

      <div class="tb-search">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <circle cx="7" cy="7" r="5" stroke="#8a8f9c" stroke-width="1.3"/>
          <path d="M11 11l3 3" stroke="#8a8f9c" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <input id="search-input" placeholder="Search workspaces, paths, branches, tasks…" autocomplete="off" spellcheck="false" />
        <span class="kbd">&#8984;F</span>
      </div>

      <div class="tb-actions">
        <button class="btn" id="btn-refresh-all" title="Refresh all workspaces">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
            <path d="M2 8a6 6 0 1110.5 4M13 4v3.5h-3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Refresh
        </button>
        <button class="btn primary" id="btn-add-workspace">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
            <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          Add Workspace
        </button>
      </div>

      <!-- Filter bar (inside toolbar grid) -->
      <div id="filterbar">
        <div class="chip-group" id="status-chips">
          <button class="chip active" data-filter="all">All <span class="count" id="count-all">0</span></button>
          <button class="chip" data-filter="active">Active <span class="count" id="count-active">0</span></button>
          <button class="chip" data-filter="dirty">
            <span style="color:var(--warn)">&#9679;</span> Has changes <span class="count" id="count-dirty">0</span>
          </button>
          <button class="chip" data-filter="running">
            <span style="color:var(--ok)">&#9679;</span> Running <span class="count" id="count-running">0</span>
          </button>
          <button class="chip" data-filter="archived">Archived <span class="count" id="count-archived">0</span></button>
        </div>

        <div class="filter-spacer"></div>

        <div class="sort-wrap">
          <button class="sort-btn" id="btn-sort" aria-haspopup="menu" aria-expanded="false">
            <svg width="11" height="11" viewBox="0 0 16 16" fill="none">
              <path d="M3 4l3-3 3 3M6 1v14M13 12l-3 3-3-3M10 15V1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span id="sort-label">Recently active</span>
            <svg width="9" height="9" viewBox="0 0 16 16" fill="none" style="color:var(--fg-3)">
              <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="sort-menu" id="sort-menu" role="menu">
            <button class="sort-menu-item" role="menuitem" data-sort="recent">
              <svg class="check" viewBox="0 0 16 16" fill="none"><path d="M3 8l3 3 7-7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Recently active
            </button>
            <button class="sort-menu-item" role="menuitem" data-sort="name">
              <svg class="check" viewBox="0 0 16 16" fill="none"><path d="M3 8l3 3 7-7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Name (A&rarr;Z)
            </button>
            <button class="sort-menu-item" role="menuitem" data-sort="lastCommit">
              <svg class="check" viewBox="0 0 16 16" fill="none"><path d="M3 8l3 3 7-7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Last commit
            </button>
          </div>
        </div>

        <div class="view-toggle" id="view-toggle">
          <button class="vt active" data-view="grid" title="Grid view">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <rect x="2" y="2" width="5" height="5" stroke="currentColor" stroke-width="1.3"/>
              <rect x="9" y="2" width="5" height="5" stroke="currentColor" stroke-width="1.3"/>
              <rect x="2" y="9" width="5" height="5" stroke="currentColor" stroke-width="1.3"/>
              <rect x="9" y="9" width="5" height="5" stroke="currentColor" stroke-width="1.3"/>
            </svg>
          </button>
          <button class="vt" data-view="list" title="List view">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <line x1="2" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              <line x1="2" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              <line x1="2" y1="12" x2="14" y2="12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Main content -->
    <div id="content">
      <div id="empty-state" style="display:none">
        <span class="empty-icon">&#128193;</span>
        <span class="empty-title">No workspaces yet</span>
        <span class="empty-sub">Add a folder to get started.<br/>HyperTerm will read CLAUDE.md and progress.md from each workspace.</span>
        <button id="btn-empty-add">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="none" style="margin-right:4px">
            <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Add Workspace
        </button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="vendor/purify.min.js"></script>
  <script src="vendor/marked.umd.js"></script>
  <script src="commonjs-shim.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
