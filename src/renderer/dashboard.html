<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self';"
  />
  <title>Workspace Dashboard — HyperTerm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />
  <style>
    /* === Design Tokens (mirror styles.css :root) === */
    :root {
      --bg-0: #0a0b0f;
      --bg-1: #0e1014;
      --bg-2: #14161c;
      --bg-3: #1a1d25;
      --bg-4: #232731;
      --line: rgba(255,255,255,0.06);
      --line-2: rgba(255,255,255,0.09);
      --line-3: rgba(255,255,255,0.13);
      --fg-0: #e8eaf0;
      --fg-1: #c6c9d2;
      --fg-2: #8a8f9c;
      --fg-3: #5d626e;
      --accent: #7c8cff;
      --accent-2: #a78bfa;
      --ok: #4ade80;
      --warn: #f5b547;
      --err: #ff6b6b;
      --cyan: #67e8f9;
      --radius: 10px;
      --glass: rgba(255,255,255,0.03);
      --glass-strong: rgba(255,255,255,0.05);
    }

    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg-0);
      color: var(--fg-0);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    /* === Titlebar (traffic lights drag region) === */
    #titlebar {
      height: 40px;
      min-height: 40px;
      background: linear-gradient(180deg, #0f1116, var(--bg-0));
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      /* left padding clears macOS traffic lights (x=12, ~60px wide) */
      padding: 0 16px 0 84px;
      -webkit-app-region: drag;
    }

    #titlebar h1 {
      font-size: 13px;
      font-weight: 600;
      color: var(--fg-1);
      letter-spacing: 0.02em;
      pointer-events: none;
    }

    /* === Main content === */
    #content {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 40px);
      overflow-y: auto;
      padding: 20px 24px 32px;
      gap: 16px;
    }

    /* === Header row === */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--fg-3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* === Add workspace button === */
    #btn-add-workspace {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
      -webkit-app-region: no-drag;
    }

    #btn-add-workspace:hover { opacity: 0.85; }
    #btn-add-workspace:active { opacity: 0.7; }

    /* === Toast === */
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-4);
      border: 1px solid var(--line-2);
      color: var(--fg-1);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      white-space: nowrap;
      z-index: 100;
    }

    #toast.visible { opacity: 1; }
    #toast.warn { color: var(--warn); }
    #toast.err { color: var(--err); }
    #toast.ok { color: var(--ok); }

    /* === Card Grid === */
    #card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 16px;
      align-items: start;
    }

    /* === Workspace Card === */
    .ws-card {
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.15s;
      display: flex;
      flex-direction: column;
    }

    .ws-card:hover {
      border-color: var(--line-2);
    }

    /* Card header-info */
    .card-header-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
      flex: 1;
    }

    .card-path {
      font-size: 11px;
      font-family: "JetBrains Mono", ui-monospace, Menlo, monospace;
      color: var(--fg-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Missing marker */
    .ws-card.missing .card-name::after {
      content: " (missing)";
      font-size: 11px;
      font-weight: 400;
      color: var(--err);
    }

    .ws-card.missing .card-path {
      color: var(--err);
      opacity: 0.6;
    }

    /* === Remove button === */
    .btn-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--fg-3);
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: background 0.12s, color 0.12s;
      flex-shrink: 0;
      font-family: inherit;
      margin-top: -1px;
    }

    .btn-remove:hover {
      background: rgba(255, 107, 107, 0.12);
      color: var(--err);
    }

    /* Card body sections */
    .card-body {
      display: flex;
      flex-direction: column;
    }

    .card-section {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    .card-section:last-child {
      border-bottom: none;
    }

    .card-section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--fg-3);
      margin-bottom: 8px;
    }

    /* Absent / not-found state within a section */
    .card-absent {
      font-size: 12px;
      color: var(--fg-3);
      font-style: italic;
    }

    /* === Markdown rendered content === */
    .md-content {
      font-size: 12px;
      line-height: 1.6;
      color: var(--fg-1);
      overflow-wrap: break-word;
      word-break: break-word;
      /* clamp tall overview sections */
      max-height: 180px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--bg-4) transparent;
    }

    .md-content::-webkit-scrollbar {
      width: 4px;
    }
    .md-content::-webkit-scrollbar-track {
      background: transparent;
    }
    .md-content::-webkit-scrollbar-thumb {
      background: var(--bg-4);
      border-radius: 2px;
    }

    /* progress sections can be a bit taller */
    .md-content.progress-content {
      max-height: 120px;
    }

    /* Markdown element styling */
    .md-content h1, .md-content h2, .md-content h3,
    .md-content h4, .md-content h5, .md-content h6 {
      color: var(--fg-0);
      font-weight: 600;
      margin-bottom: 6px;
      margin-top: 10px;
      line-height: 1.3;
    }
    .md-content h1:first-child,
    .md-content h2:first-child,
    .md-content h3:first-child { margin-top: 0; }

    .md-content h1 { font-size: 14px; }
    .md-content h2 { font-size: 13px; }
    .md-content h3 { font-size: 12px; }

    .md-content p {
      margin-bottom: 6px;
    }
    .md-content p:last-child { margin-bottom: 0; }

    .md-content ul, .md-content ol {
      padding-left: 18px;
      margin-bottom: 6px;
    }
    .md-content li { margin-bottom: 2px; }

    .md-content code {
      font-family: "JetBrains Mono", ui-monospace, Menlo, monospace;
      font-size: 11px;
      background: var(--bg-4);
      border: 1px solid var(--line-2);
      border-radius: 3px;
      padding: 1px 4px;
      color: var(--cyan);
    }

    .md-content pre {
      background: var(--bg-1);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      overflow-x: auto;
      margin-bottom: 8px;
    }

    .md-content pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--fg-1);
      font-size: 11px;
    }

    .md-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      margin: 6px 0;
      color: var(--fg-2);
    }

    .md-content a {
      color: var(--accent);
      text-decoration: none;
    }
    .md-content a:hover { text-decoration: underline; }

    .md-content strong { color: var(--fg-0); font-weight: 600; }
    .md-content em { color: var(--fg-2); }

    .md-content table {
      border-collapse: collapse;
      font-size: 11px;
      margin-bottom: 8px;
      width: 100%;
    }
    .md-content th, .md-content td {
      border: 1px solid var(--line-2);
      padding: 4px 8px;
      text-align: left;
    }
    .md-content th {
      background: var(--bg-3);
      color: var(--fg-1);
      font-weight: 600;
    }

    .md-content hr {
      border: none;
      border-top: 1px solid var(--line);
      margin: 8px 0;
    }

    /* === Git Log table === */
    .git-log-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      font-family: "JetBrains Mono", ui-monospace, Menlo, monospace;
    }

    .git-log-table tr + tr {
      border-top: 1px solid var(--line);
    }

    .git-log-table td {
      padding: 4px 0;
      vertical-align: top;
    }

    .git-log-hash {
      color: var(--accent);
      white-space: nowrap;
      padding-right: 10px;
      width: 52px;
    }

    .git-log-msg {
      color: var(--fg-1);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      max-width: 0; /* required for text-overflow in table cell */
      width: 100%;
    }

    .git-log-time {
      color: var(--fg-3);
      white-space: nowrap;
      padding-left: 10px;
      text-align: right;
    }

    /* Loading skeleton */
    .card-loading {
      padding: 16px 14px;
      color: var(--fg-3);
      font-size: 12px;
      font-style: italic;
    }

    /* === Refresh all button === */
    #btn-refresh-all {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: var(--bg-3);
      color: var(--fg-2);
      border: 1px solid var(--line-2);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.12s, color 0.12s;
      -webkit-app-region: no-drag;
    }

    #btn-refresh-all:hover {
      background: var(--bg-4);
      color: var(--fg-1);
    }

    /* === Card header actions === */
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--line);
    }

    .card-header-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
      margin-top: -1px;
    }

    /* === Per-card refresh button === */
    .btn-card-refresh {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--fg-3);
      padding: 3px 5px;
      border-radius: 4px;
      transition: background 0.12s, color 0.12s;
      display: flex;
      align-items: center;
    }

    .btn-card-refresh:hover {
      background: var(--glass-strong);
      color: var(--accent);
    }

    /* === Open button === */
    .btn-open-workspace {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    .btn-open-workspace:hover:not(.disabled) { opacity: 0.85; }
    .btn-open-workspace:active:not(.disabled) { opacity: 0.7; }
    .btn-open-workspace.disabled,
    .btn-open-workspace:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* === Inline name edit === */
    .card-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--fg-0);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: text;
      border-radius: 3px;
      transition: background 0.12s;
    }

    .card-name:hover {
      background: var(--glass-strong);
    }

    .card-name-input {
      font-size: 14px;
      font-weight: 600;
      color: var(--fg-0);
      background: var(--bg-3);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 1px 6px;
      outline: none;
      width: 100%;
      font-family: inherit;
      min-width: 80px;
    }

    /* === Missing card actions (remove from list) === */
    .card-missing-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-remove-missing {
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid rgba(255, 107, 107, 0.25);
      color: var(--err);
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 5px;
      font-family: inherit;
      transition: background 0.12s;
    }

    .btn-remove-missing:hover {
      background: rgba(255, 107, 107, 0.2);
    }

    /* === Enhanced empty state === */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 64px 24px;
      text-align: center;
    }

    #empty-state .empty-icon {
      font-size: 40px;
      opacity: 0.3;
    }

    #empty-state .empty-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--fg-1);
    }

    #empty-state .empty-sub {
      font-size: 13px;
      color: var(--fg-3);
      line-height: 1.5;
    }

    #btn-empty-add {
      margin-top: 4px;
      padding: 8px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }

    #btn-empty-add:hover { opacity: 0.85; }
    #btn-empty-add:active { opacity: 0.7; }
  </style>
</head>
<body>
  <div id="titlebar">
    <h1>Workspace Dashboard</h1>
  </div>

  <div id="content">
    <div class="section-header">
      <span class="section-title">Workspaces</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <button id="btn-refresh-all" title="Refresh all cards">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
            <path d="M13.5 8A5.5 5.5 0 1 1 8 2.5c1.6 0 3 .68 4 1.76" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            <path d="M12 2v3h-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Refresh
        </button>
        <button id="btn-add-workspace">
          <svg width="10" height="10" viewBox="0 0 16 16" fill="none">
            <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Add Workspace
        </button>
      </div>
    </div>

    <div id="card-grid"></div>
    <div id="empty-state" style="display:none">
      <span class="empty-icon">&#128193;</span>
      <span class="empty-title">No workspaces yet</span>
      <span class="empty-sub">Add a folder to get started.<br/>HyperTerm will read CLAUDE.md and progress.md from each workspace.</span>
      <button id="btn-empty-add">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="none" style="margin-right:4px">
          <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Add Workspace
      </button>
    </div>
  </div>

  <div id="toast"></div>

  <!-- Vendor libs (served from self origin — CSP: script-src 'self') -->
  <script src="vendor/purify.min.js"></script>
  <script src="vendor/marked.umd.js"></script>
  <!-- CommonJS shim must load before dashboard.js (compiled with module: commonjs) -->
  <script src="commonjs-shim.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
